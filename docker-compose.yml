# JTracer — optional Docker stack (API only; collectors run on the host OS).
#
# Native dev (recommended for Phase 6):
#   cd backend && mvn spring-boot:run
#
# Docker API (collectors disabled; share ./data with host collectors):
#   docker compose up --build backend

services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JTRACER_DATABASE_LIVE_PATH: /app/data/jtracer-live.db
      JTRACER_COLLECTOR_AUTO_START: "false"
    volumes:
      - ./data:/app/data
      - ./knowledge-base:/app/knowledge-base:ro
